<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Library</title>
    <style>
        body {
            background-color: #f8f8f8;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .book-library {
            background-color: #ffffff;
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .book {
            width: 200px;
            padding: 15px;
            margin: 15px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .book img {
            width: 100%;
        }

        .book h2 {
            margin: 10px 0;
        }

        .book p {
            color: #777777;
        }

        .price {
            background-color: #2ecc71;
            color: #ffffff;
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Book Library</h1>

<div class="book-library">

    <div class="book">
        <img src="https://via.placeholder.com/150" alt="Spy in the Amber">
        <h2>Spy in the Amber</h2>
        <p>Unknown Author</p>
        <div class="price">₹299</div>
    </div>

    <div class="book">
        <img src="https://via.placeholder.com/150" alt="Sacred Games">
        <h2>Sacred Games</h2>
        <p>Vikram Chandra</p>
        <div class="price">₹399</div>
    </div>

    <div class="book">
        <img src="https://via.placeholder.com/150" alt="Byomkesh Bakshi">
        <h2>Byomkesh Bakshi</h2>
        <p>Sharadindu Bandyopadhyay</p>
        <div class="price">₹249</div>
    </div>

</div>

</body>
</html>
