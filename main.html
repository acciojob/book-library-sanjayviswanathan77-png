<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Library</title>
    <style>
        body {
            background-color: #f8f8f8;
            font-family: Arial, sans-serif;
        }

        .book-library {
            background-color: #ffffff;
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .book {
            width: 200px;
            padding: 15px;
            margin: 15px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .book img {
            width: 100%;
            height: auto;
        }

        .title {
            font-weight: bold;
            margin: 10px 0;
        }

        .author {
            color: #777777;
            margin-bottom: 10px;
        }

        .price {
            background-color: #2ecc71;
            color: white;
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="book-library">

    <div class="book">
        <img src="https://via.placeholder.com/150" alt="Spy in the Amber">
        <div class="title">Spy in the Amber</div>
        <div class="author">Unknown Author</div>
        <div class="price">₹299</div>
    </div>

    <div class="book">
        <img src="https://via.placeholder.com/150" alt="Sacred Games">
        <div class="title">Sacred Games</div>
        <div class="author">Vikram Chandra</div>
        <div class="price">₹399</div>
    </div>

    <div class="book">
        <img src="https://via.placeholder.com/150" alt="Byomkesh Bakshi">
        <div class="title">Byomkesh Bakshi</div>
        <div class="author">Sharadindu Bandyopadhyay</div>
        <div class="price">₹249</div>
    </div>

</div>

</body>
</html>
